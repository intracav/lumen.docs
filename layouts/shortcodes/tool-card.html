{{ $color := .Get "color" | default "var(--accent)" }}
<div class="tool-card">
  <div class="tool-icon" style="background: {{ $color }}1a; color: {{ $color }};">
    {{ .Get "icon" | safeHTML }}
  </div>
  <div class="tool-info">
    <div class="tool-name">{{ .Get "name" }}</div>
    <div class="tool-desc">{{ .Get "desc" }}</div>
    {{ with .Get "example" }}
    <div class="tool-example">{{ . }}</div>
    {{ end }}
    {{ if .Get "badge" }}
    <div class="tool-badges">
      <span class="tool-badge" style="background: {{ $color }}1a; color: {{ $color }};">{{ .Get "badge" }}</span>
    </div>
    {{ end }}
  </div>
</div>
