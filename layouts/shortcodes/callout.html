{{ $type := .Get "type" | default "info" }}
{{ $icons := dict "info" "&#128161;" "success" "&#9989;" "warning" "&#9888;&#65039;" "important" "&#10071;" }}
<div class="callout callout-{{ $type }}">
  <span class="callout-icon">{{ index $icons $type | safeHTML }}</span>
  <div>{{ .Inner | markdownify }}</div>
</div>
