<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <div class="scroll-progress"></div>

  <div class="site-wrapper {{ if .IsHome }}home-layout{{ end }}">
    {{ if not .IsHome }}
      {{ partial "sidebar.html" . }}
    {{ end }}

    <main class="main-content">
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  {{ if not .IsHome }}
    {{ partial "footer.html" . }}
  {{ end }}

  <script src="/js/main.js"></script>
</body>
</html>
